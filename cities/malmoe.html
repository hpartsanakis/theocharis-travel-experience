<!doctype html>
<html lang="en">

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>malmoe — Theocharis Travel Experience</title>

    <link rel="stylesheet" href="../style.css?v=1" />

  <body>
    <!-- HERO -->

    <section
      class="hero reveal destination-hero"
      style="--hero-image: url(../images/sweden/malmoe/optimized/malmoe-cover.jpg)"
    >
      <div class="container">
        <div class="hero-text">
          <p class="eyebrow">sweden</p>

          <h1>malmoe</h1>

          <p>Travel moments and photography from malmoe.</p>

          <a href="#malmoe-gallery" class="btn"> View Photos </a>
        </div>
      </div>
    </section>
