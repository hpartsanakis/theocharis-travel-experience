<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>milan — Theocharis Travel Experience</title>

    <link rel="stylesheet" href="../style.css?v=1" />
  </head>

  <body>
    <!-- HERO -->

    <section
      class="hero reveal destination-hero"
      style="--hero-image: url(../images/italy/milan/optimized/milan-cover.jpeg)"
    >
      <div class="container">
        <div class="hero-text">
          <p class="eyebrow">italy</p>

          <h1>milan</h1>

          <p>Travel moments and photography from milan.</p>

          <a href="#milan-gallery" class="btn"> View Photos </a>
        </div>
      </div>
    </section>

        <h2>milan Gallery</h2>

        <p class="section-intro">Photography moments from milan.</p>

          <div class="gallery-item">
            <picture>
              <source
                srcset="../images/italy/milan/webp/milan-1.webp"
                type="image/webp"
              />

              <img
                src="../images/italy/milan/optimized/milan-1.jpeg"
                alt="milan travel photo"
                loading="lazy"
                decoding="async"
              />
            </picture>
