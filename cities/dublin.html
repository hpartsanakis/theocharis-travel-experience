<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>dublin — Theocharis Travel Experience</title>

    <link rel="stylesheet" href="../style.css?v=1" />
  </head>

  <body>
    <!-- HERO -->

    <section
      class="hero reveal destination-hero"
      style="
        --hero-image: url(../images/ireland/dublin/optimized/dublin-cover.jpeg);
      "
    >
      <div class="container">
        <div class="hero-text">
          <p class="eyebrow">ireland</p>

          <h1>dublin</h1>

          <p>Travel moments and photography from dublin.</p>

          <a href="#dublin-gallery" class="btn"> View Photos </a>
        </div>
      </div>
    </section>

    <!-- GALLERY -->

    <section id="dublin-gallery" class="gallery reveal">
      <div class="container">
        <h2>dublin Gallery</h2>

        <p class="section-intro">Photography moments from dublin.</p>

        <div class="gallery-grid city-gallery">
          <!-- GENERATED GALLERY -->

          <div class="gallery-item">
            <picture>
              <source
                srcset="../images/ireland/dublin/webp/dublin-1.webp"
                type="image/webp"
              />

              <img
                src="../images/ireland/dublin/optimized/dublin-1.jpeg"
                alt="dublin travel photo"
                loading="lazy"
                decoding="async"
              />
            </picture>

            <p>dublin travel photo</p>
          </div>

          <div class="gallery-item">
            <picture>
              <source
                srcset="../images/ireland/dublin/webp/dublin-2.webp"
                type="image/webp"
              />

              <img
                src="../images/ireland/dublin/optimized/dublin-2.jpeg"
                alt="dublin travel photo"
                loading="lazy"
                decoding="async"
              />
            </picture>

            <p>dublin travel photo</p>
          </div>

          <div class="gallery-item">
            <picture>
              <source
                srcset="../images/ireland/dublin/webp/dublin-3.webp"
                type="image/webp"
              />

              <img
                src="../images/ireland/dublin/optimized/dublin-3.jpeg"
                alt="dublin travel photo"
                loading="lazy"
                decoding="async"
              />
            </picture>

            <p>dublin travel photo</p>
          </div>

          <div class="gallery-item">
            <picture>
              <source
                srcset="../images/ireland/dublin/webp/dublin-4.webp"
                type="image/webp"
              />

              <img
                src="../images/ireland/dublin/optimized/dublin-4.jpeg"
                alt="dublin travel photo"
                loading="lazy"
                decoding="async"
              />
            </picture>

            <p>dublin travel photo</p>
          </div>

          <div class="gallery-item">
            <picture>
              <source
                srcset="../images/ireland/dublin/webp/dublin-cover.webp"
                type="image/webp"
              />

              <img
                src="../images/ireland/dublin/optimized/dublin-cover.jpeg"
                alt="dublin travel photo"
                loading="lazy"
                decoding="async"
              />
            </picture>

            <p>dublin travel photo</p>
          </div>
        </div>
      </div>
    </section>

    <!-- LIGHTBOX -->

    <div class="lightbox">
      <button class="lightbox-close">&times;</button>

      <button class="lightbox-prev">&#10094;</button>

      <img class="lightbox-img" src="" alt="" />

      <button class="lightbox-next">&#10095;</button>

      <div class="lightbox-counter">1 / 1</div>
    </div>

    <script src="../script.js?v=1"></script>
  </body>
</html>
