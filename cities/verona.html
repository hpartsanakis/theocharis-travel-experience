<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Verona — Theocharis Travel Experience</title>

    <link rel="stylesheet" href="../style.css?v=1" />
  </head>

  <body>
    <!-- ========================= -->
    <!-- HERO -->
    <!-- ========================= -->

    <section class="hero">
      <div class="container hero-content">
        <h1>Verona</h1>

        <p>
          Historic streets, warm evening light, and timeless Italian atmosphere.
        </p>

        <a href="../index.html" class="btn">← Back Home</a>
      </div>
    </section>

    <!-- ========================= -->
    <!-- GALLERY -->
    <!-- ========================= -->

    <section class="destinations">
      <div class="container">
        <h2>Photo Gallery</h2>

        <div class="gallery-grid">
          <div class="gallery-item">
            <img
              src="../images/italy/verona/verona-1.jpg"
              alt="Verona"
            />
          </div>

          <div class="gallery-item">
            <img
              src="../images/italy/verona/verona-2.jpg"
              alt="Verona"
            />
          </div>

          <div class="gallery-item">
            <img
              src="../images/italy/verona/verona-3.jpg"
              alt="Verona"
            />
          </div>
        </div>
      </div>
    </section>

    <!-- ========================= -->
    <!-- LIGHTBOX -->
    <!-- ========================= -->

    <div class="lightbox">
      <button class="lightbox-close">&times;</button>

      <button class="lightbox-prev">&#10094;</button>

      <img class="lightbox-img" src="" alt="" />

      <button class="lightbox-next">&#10095;</button>

      <div class="lightbox-counter">1 / 1</div>
    </div>

    <!-- ========================= -->
    <!-- JAVASCRIPT -->
    <!-- ========================= -->

    <script src="../data/destinations.js"></script>

    <script src="../script.js?v=1"></script>
  </body>
</html>
